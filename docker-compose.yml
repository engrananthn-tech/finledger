version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  core:
    build: ./core
    ports:
      - "8000:8000"
    env_file: ./core/.env
    depends_on:
      - db

  bank:
    build: ./Bank
    ports:
      - "8001:8001"
    env_file: ./Bank/.env
    depends_on:
      - db

volumes:
  pgdata: